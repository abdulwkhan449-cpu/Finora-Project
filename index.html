<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Finance Tracker</title>
    <!-- Chart.js CDN for the pie chart -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- Link to our external CSS -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="container">

        <!-- ===== HEADER ===== -->
        <header class="header">
            <h1>💰 Finance Tracker</h1>
            <button class="dark-toggle" id="darkModeToggle">🌙 Dark Mode</button>
        </header>

        <!-- ===== SUMMARY CARDS ===== -->
        <section class="summary">
            <div class="card">
                <h3>💰 Balance</h3>
                <div class="amount balance-text" id="balanceDisplay">$0.00</div>
            </div>
            <div class="card">
                <h3>⬆ Income</h3>
                <div class="amount income-text" id="incomeDisplay">$0.00</div>
            </div>
            <div class="card">
                <h3>⬇ Expenses</h3>
                <div class="amount expense-text" id="expenseDisplay">$0.00</div>
            </div>
        </section>

        <!-- ===== FILTER (Month Picker) ===== -->
        <div class="filter-section">
            <label for="monthFilter">📅 Filter by Month:</label>
            <input type="month" id="monthFilter" />
        </div>

        <!-- ===== FORM + CHART (Side by side) ===== -->
        <div class="row">
            <!-- LEFT: Form -->
            <div class="form-box">
                <h2 id="formTitle">➕ Add Transaction</h2>
                <form id="transactionForm">
                    <div class="form-group">
                        <label for="description">Description</label>
                        <input type="text" id="description" placeholder="e.g., Groceries" required />
                    </div>
                    <div class="form-group">
                        <label for="amount">Amount ($)</label>
                        <input type="number" id="amount" placeholder="0.00" step="0.01" min="0.01" required />
                    </div>
                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category">
                            <option value="Food">🍔 Food</option>
                            <option value="Transport">🚗 Transport</option>
                            <option value="Shopping">🛍️ Shopping</option>
                            <option value="Bills">📄 Bills</option>
                            <option value="Entertainment">🎮 Entertainment</option>
                            <option value="Salary">💰 Salary</option>
                            <option value="Other">📦 Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Type</label>
                        <div class="radio-group">
                            <label><input type="radio" name="type" value="income" checked /> Income</label>
                            <label><input type="radio" name="type" value="expense" /> Expense</label>
                        </div>
                    </div>
                    <button type="submit" class="btn" id="submitBtn">➕ Add Transaction</button>
                </form>
            </div>

            <!-- RIGHT: Chart -->
            <div class="chart-box">
                <h2>📊 Spending Breakdown</h2>
                <canvas id="expenseChart" width="300" height="200"></canvas>
                <p id="chartEmptyMsg" style="color: var(--text-secondary); margin-top: 10px; font-size: 0.9rem;">
                    No expenses this month.
                </p>
            </div>
        </div>

        <!-- ===== TRANSACTION LIST ===== -->
        <div class="list-box">
            <h2>📋 Transactions</h2>
            <div id="transactionList">
                <!-- Transactions will be rendered here by JavaScript -->
            </div>
        </div>

    </div>

    <!-- Link to our external JavaScript -->
    <script src="script.js"></script>
</body>
</html>
